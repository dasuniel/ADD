version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s (%(filename)s:%(lineno)d): %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/etl.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8

root:
  level: DEBUG
  handlers: [console, file]

loggers:
  src.extract:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.transform:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.load:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  src.pipelines:
    level: INFO
    handlers: [console, file]
    propagate: false
